<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#2BA8A2" />
  <title>Flip 7 ??? Tableau des scores</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <script>
    // Always load fresh CSS — unique URL per page load so it's never cached.
    (function () {
      var l = document.createElement("link");
      l.rel = "stylesheet";
      l.href = "styles.css?t=" + Date.now();
      document.head.appendChild(l);
    })();
  </script>
</head>
<body>
  <header class="topbar">
    <button class="place-btn" id="placeBtn" hidden></button>
    <h1 class="logo" id="homeBtn"><span class="lf">FLIP</span><span class="l7">7</span></h1>
    <span class="tagline">Tableau des scores</span>
  </header>

  <main id="app"></main>

  <div id="modal-root"></div>

  <!-- Supabase client (shared data store) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // Always load fresh JS — unique URL per page load (config.js, then app.js, in order).
    (function () {
      var t = Date.now();
      function load(src, next) {
        var s = document.createElement("script");
        s.src = src + "?t=" + t;
        s.async = false; // keep execution order
        if (next) s.onload = next;
        document.body.appendChild(s);
      }
      load("config.js", function () { load("app.js"); });
    })();
  </script>
</body>
</html>
