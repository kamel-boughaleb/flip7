<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <!-- DEPLOY BASE (path-based routing) — injecté AVANT tout asset pour que les
         URLs relatives (CSS, modules, fonts) se résolvent quelle que soit la
         profondeur de l'URL. Auto-détecté depuis le chemin : "/flip7/" si servi
         depuis ce sous-dossier (MAMP local), sinon "/" (racine, prod). Les mêmes
         fichiers marchent donc dans les deux environnements. Le routeur lit cette
         base via document.baseURI. -->
    <script>
      (function () {
        var base = /^\/flip7\//.test(location.pathname) ? "/flip7/" : "/";
        var b = document.createElement("base");
        b.href = base;
        document.head.appendChild(b);
      })();
    </script>
    <meta
      http-equiv="Cache-Control"
      content="no-cache, no-store, must-revalidate"
    />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#2BA8A2" />
    <title>Compteur de score</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="fonts/font-awesome/css/all.min.css" />
    <script>
      // Always load fresh CSS — unique URL per page load so it's never cached.
      (function () {
        var l = document.createElement("link");
        l.rel = "stylesheet";
        l.href = "styles.css?t=" + Date.now();
        document.head.appendChild(l);
      })();
    </script>
  </head>
  <body>
    <header class="topbar">
      <h1 class="logo" id="homeBtn">
        <span class="lf">FLIP</span><span class="l7">7</span>
      </h1>
      <button
        class="topbar-btn"
        id="rulesBtn"
        title="Règles du jeu"
        aria-label="Règles du jeu"
      >
        <i class="fa-regular fa-book-open"></i>
      </button>
      <button class="place-btn" id="placeBtn" hidden></button>
    </header>

    <main id="app"></main>

    <div id="modal-root"></div>

    <!-- Supabase client (shared data store) — global, before the app modules -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <!-- App entry point as an ES module (statically imports ./js/*.js). Module
         scripts are deferred, so they execute after config.js above. -->
    <script type="module" src="app.js"></script>
  </body>
</html>
