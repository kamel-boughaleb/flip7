<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <!-- DEPLOY BASE (path-based routing) — injecté AVANT tout asset pour que les
         URLs relatives (CSS, modules, fonts) se résolvent quelle que soit la
         profondeur de l'URL. Auto-détecté depuis le chemin : "/flip7/" si servi
         depuis ce sous-dossier (MAMP local), sinon "/" (racine, prod). Les mêmes
         fichiers marchent donc dans les deux environnements. Le routeur lit cette
         base via document.baseURI. -->
    <script>
      (function () {
        var base = /^\/flip7\//.test(location.pathname) ? "/flip7/" : "/";
        var b = document.createElement("base");
        b.href = base;
        document.head.appendChild(b);
      })();
    </script>
    <meta
      http-equiv="Cache-Control"
      content="no-cache, no-store, must-revalidate"
    />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#fff8e7" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f1f1d" media="(prefers-color-scheme: dark)" />
    <title>Kigagne ?</title>
    <!-- Favicons & PWA manifest live under img/favicon/. Paths are relative so
         they resolve against the injected <base> (works at "/" and "/flip7/"). -->
    <link rel="icon" type="image/png" href="img/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="img/favicon/favicon.svg" />
    <link rel="shortcut icon" href="img/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="img/favicon/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Kigagne ?" />
    <link rel="manifest" href="img/favicon/site.webmanifest" />
    <link rel="stylesheet" href="fonts/font-awesome/css/all.min.css" />
    <script>
      // Always load fresh CSS — unique URL per page load so it's never cached.
      (function () {
        var l = document.createElement("link");
        l.rel = "stylesheet";
        l.href = "styles.css?t=" + Date.now();
        document.head.appendChild(l);
      })();
    </script>
    <style>
      /* Écran de lancement (splash) — styles critiques en inline pour couvrir
         l'écran dès le premier paint, sans attendre styles.css (asynchrone).
         app.js le masque (classe "is-hiding") une fois le délai minimum écoulé
         ET le boot terminé, puis retire le nœud du DOM. */
      #launch-screen {
        position: fixed;
        inset: 0;
        z-index: 1000;
        display: grid;
        place-items: center;
        background: #fff8e7;
        transition: opacity 0.5s ease;
      }
      #launch-screen.is-hiding {
        opacity: 0;
        pointer-events: none;
      }
      #launch-screen img {
        width: min(20rem, 70vw);
        height: auto;
        animation: launch-logo-in 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      }
      @media (prefers-color-scheme: dark) {
        #launch-screen {
          background: #0f1f1d;
        }
      }
      @keyframes launch-logo-in {
        0% {
          opacity: 0;
          transform: scale(0.82);
        }
        100% {
          opacity: 1;
          transform: scale(1);
        }
      }
      /* Réduit le mouvement : pas de zoom du logo (le fondu de sortie reste,
         ce n'est qu'une transition d'opacité). */
      @media (prefers-reduced-motion: reduce) {
        #launch-screen img {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <!-- Écran de lancement (splash), affiché à chaque ouverture puis masqué en
         fondu (voir le <style> critique dans le <head>). -->
    <div id="launch-screen" aria-hidden="true">
      <picture>
        <source media="(prefers-color-scheme: dark)" srcset="img/logo_white.svg" />
        <img src="img/logo_color.svg" alt="Kigagne ?" />
      </picture>
    </div>

    <header class="topbar">
      <h1 class="logo" id="homeBtn">
        <picture>
          <source media="(prefers-color-scheme: dark)" srcset="img/logo_white.svg" />
          <img src="img/logo_color.svg" alt="Kigagne ?" />
        </picture>
      </h1>
      <button
        class="topbar-btn"
        id="rulesBtn"
        title="Règles du jeu"
        aria-label="Règles du jeu"
      >
        <i class="fa-regular fa-book-open"></i>
      </button>
      <button class="place-btn" id="placeBtn" hidden></button>
    </header>

    <main id="app"></main>

    <div id="modal-root"></div>

    <!-- Supabase client (shared data store) — global, before the app modules -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <!-- App entry point as an ES module (statically imports ./js/*.js). Module
         scripts are deferred, so they execute after config.js above. -->
    <script type="module" src="app.js"></script>
  </body>
</html>
